name: Build
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:
env:
  NUGET_FEED: https://api.nuget.org/v3/index.json
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # Needed by dorny/test-reporter to publish the check run
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 17

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup .NET core versions
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v6
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Start SonarCloud scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
          /k:"Qowaiv_Qowaiv" \
          /o:"qowaiv" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
          /d:sonar.cs.vstest.reportsPaths="**/*.trx"

      - name: Build
        run: dotnet build qowaiv.slnx --configuration Release

      - name: Test
        run: |
          dotnet test specs/Qowaiv.Specs --configuration Release \
          --logger "trx;LogFileName=test-results.trx" \
          --collect:"XPlat Code Coverage;Format=opencover"

      - name: Stop SonarCloud scanner
        if: success() || failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner end \
          /d:sonar.token="$SONAR_TOKEN"

      - name: Test Report
        if: success() || failure()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2
        with:
          name: Unit test results
          path: "**/*.trx"
          reporter: dotnet-trx

      - name: DotNet Pack
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet pack qowaiv.slnx -v normal --no-build --no-restore -c Release --output packages

      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: packages/*.nupkg

  publish:
    name: Publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create the GitHub release
    needs: build
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          prerelease=""
          if [[ "$TAG" == *-* ]]; then
            prerelease="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $prerelease

      - name: DotNet NuGet Push
        env:
          NUGET_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "*.nupkg" --source "$NUGET_FEED" --api-key "$NUGET_KEY" --skip-duplicate --no-symbols
